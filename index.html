<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדס צוק - תכנון גנים ונוף</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9f7f4;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #2d5016 0%, #4a7c23 50%, #6b8f3c 100%);
            color: white;
            text-align: center;
            padding: 80px 20px 60px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.3em;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .about {
            text-align: center;
            margin-bottom: 60px;
        }

        .about h2 {
            font-size: 1.8em;
            color: #2d5016;
            margin-bottom: 20px;
        }

        .about p {
            font-size: 1.1em;
            color: #555;
            max-width: 700px;
            margin: 0 auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .gallery-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .gallery-item p {
            padding: 15px;
            text-align: center;
            color: #555;
            font-size: 0.95em;
        }

        .gallery-placeholder {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            border: 2px dashed #c5d4a8;
            color: #888;
        }

        .gallery-placeholder p {
            font-size: 1.1em;
        }

        .contact {
            text-align: center;
            margin: 60px 0;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
        }

        .contact h2 {
            font-size: 1.6em;
            color: #2d5016;
            margin-bottom: 20px;
        }

        .contact a {
            display: inline-block;
            background: #4a7c23;
            color: white;
            padding: 12px 35px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.1em;
            transition: background 0.3s ease;
        }

        .contact a:hover {
            background: #2d5016;
        }

        footer {
            background: #2d5016;
            color: rgba(255,255,255,0.8);
            text-align: center;
            padding: 25px 20px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2em; }
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>הדס צוק</h1>
        <p>תכנון גנים ונוף</p>
    </header>

    <div class="container">
        <div class="about">
            <h2>עיצוב ותכנון גנים ונוף</h2>
            <p>הפיכת חלומות ירוקים למציאות. תכנון ועיצוב גנים ונוף, בגישה אישית ומקצועית.</p>
        </div>

        <div class="gallery">
            <div class="gallery-placeholder">
                <p>🌿 גלריית עבודות בקרוב</p>
            </div>
        </div>

        <div class="contact">
            <h2>צרו קשר</h2>
            <a href="mailto:hadas@tsook.net">hadas@tsook.net</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 הדס צוק - תכנון גנים ונוף</p>
    </footer>
</body>
</html>
